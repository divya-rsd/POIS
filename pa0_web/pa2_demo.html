<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PA #2 - PRF via GGM</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Playfair+Display:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .layout-pa { max-width: 900px; margin: 40px auto; padding: 0 20px; }
  .tree-container {
    display: flex; flex-direction: column; align-items: center; gap: 15px;
    margin-top: 20px; overflow-x: auto; padding-bottom: 20px;
  }
  .tree-level { display: flex; gap: 10px; }
  .tree-node {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--surface3); border: 1px solid var(--border2);
    transition: var(--t);
  }
  .tree-node.active {
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent-glow);
    border-color: var(--accent);
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-icon">∥</div>
    <div class="logo-text"> &nbsp;<em>Minicrypt</em> PA #2</div>
  </div>
  <div class="bar-section">
    <a href="index.html" class="btn btn-ghost btn-sm" style="text-decoration:none">← Back to Dashboard</a>
  </div>
</div>

<div class="layout-pa">
  <div class="demo-title">GGM Tree Visualizer</div>
  <div class="hero-sub" style="margin-bottom: 24px;">Visualize how the Goldreich-Goldwasser-Micali PRF constructs a tree from a PRG to evaluate a query.</div>

  <div class="card fg">
    <div class="row">
      <div class="fg" style="flex:1">
        <div class="fl">Key (Hex)</div>
        <input type="text" id="ggm-key" value="00112233" placeholder="Hex key (up to 8 bytes)">
      </div>
      <div class="fg" style="flex:1">
        <div class="fl">Query (Binary, up to 8 bits)</div>
        <input type="text" id="ggm-query" value="101" placeholder="e.g. 101">
      </div>
    </div>
    
    <div class="row" style="margin-top:15px">
      <button class="btn btn-primary" id="btn-eval">▶ Evaluate GGM</button>
    </div>
    
    <div class="fg" style="margin-top: 15px;">
      <div class="fl">Output (Hex)</div>
      <input type="text" id="ggm-out" readonly class="mono" style="background:var(--bg)">
    </div>
  </div>

  <div class="card" style="margin-top: 20px; text-align:center;">
    <div class="fl">Tree Visualization</div>
    <div class="tree-container" id="tree-container">
      <!-- Generated by JS -->
    </div>
  </div>
</div>

<script src="api.js"></script>
<script src="pa2_demo.js"></script>
</body>
</html>
